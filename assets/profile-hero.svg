      <rect x="399" width="164" height="36" rx="10" fill="#3FB950" fill-opacity="0.14" stroke="#3FB950" stroke-opacity="0.5"/>
      <text x="481" y="23" text-anchor="middle" fill="#7EE787" font-family="Inter, sans-serif" font-size="13" font-weight="700">LEETCODE KNIGHT</text>
