      <text x="74" y="148" fill="#C9D1D9">problems =</text>
      <text x="166" y="148" fill="#79C0FF">1800</text>
      <text x="206" y="148" fill="#C9D1D9">;</text>

      <text x="42" y="180" fill="#D2A8FF">void</text>
      <text x="79" y="180" fill="#D2A8FF">solve</text>
      <text x="126" y="180" fill="#C9D1D9">() {</text>

      <text x="62" y="212" fill="#FF7B72">while</text>
      <text x="108" y="212" fill="#C9D1D9">(unsolved) {</text>

      <text x="82" y="244" fill="#D2A8FF">learn</text>
      <text x="126" y="244" fill="#C9D1D9">();</text>
      <text x="166" y="244" fill="#D2A8FF">build</text>
      <text x="210" y="244" fill="#C9D1D9">();</text>
      <text x="250" y="244" fill="#D2A8FF">compete</text>
      <text x="310" y="244" fill="#C9D1D9">();</text>

      <text x="62" y="270" fill="#C9D1D9">}</text>
      <text x="24" y="270" fill="#C9D1D9">}</text>
      <text x="338" y="270" fill="#C9D1D9">}</text>
